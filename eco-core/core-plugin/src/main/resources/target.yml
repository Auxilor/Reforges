#
# A target consists of items and a slot.
#

# The options for slot are mainhand, offhand, hands, helmet, chestplate,
# leggings, boots, armor, any, a number from 0-40 (to specify an exact slot),
# or a list of slots like "9, 10, 11, mainhand"

pickaxe:
  slot: hands
  items:
    - "#items_pickaxes"

axe:
  slot: hands
  items:
    - "#items_axes"

melee:
  slot: hands
  items:
    - "#items_axes"
    - "#items_swords"

trident:
  slot: hands
  items:
    - trident
bow:
  slot: hands
  items:
    - bow
    - crossbow
armor:
  slot: armor
  items:
    - "#items_head_armor"
    - "#items_chest_armor"
    - "#items_leg_armor"
    - "#items_foot_armor"
